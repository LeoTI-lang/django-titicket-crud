{% extends 'base.html' %}

{% block contenido %}

<div class="container mt-5" style="max-width:600px;">

    <div class="card shadow">
        <div class="card-body">

            <h2 class="card-title mb-4 text-center">
                Regístrate para comprar tickets
            </h2>

            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                
                    <div class="mb-3">
                        <label class="form-label">
                            {{ field.label }}
                        </label>

                        {{ field }}

                        {% if field.help_text %}
                            <div class="form-text">
                                {{ field.help_text }}
                            </div>
                        {% endif %}

                        {% for error in field.errors %}
                            <div class="text-danger">
                                {{ error }}
                            </div>
                        {% endfor %}
                    </div>

                {% endfor %}

                <div class="d-grid">
                    <button class="btn btn-primary">
                        Registrarse
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
