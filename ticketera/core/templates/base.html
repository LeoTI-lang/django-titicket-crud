<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Titickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>

<body>
    <header>
        <div class="container">

            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="{% url 'lista_eventos' %}">Titickets</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav">
                            <a class="nav-link active" aria-current="page" href="{% url 'lista_eventos' %}">Inicio</a>
                            {% if user.is_authenticated %}
                                <a class="nav-link" href="{% url 'ver_carrito' %}">Ver carrito</a>
                                
                                <form action="{% url 'logout' %}" method="post">
                                    {% csrf_token %}
                                    <button class="btn btn-link nav-link">Cerrar sesión</button>
                                </form>

                                {% if user.groups.all.0.name == "administrador" %}
                                    <a class="nav-link" href="{% url 'lista_productoras' %}">Listar productoras</a>
                                    <a class="nav-link" href="{% url 'lista_ubicaciones' %}">Listar ubicaciones</a>
                                    <a class="nav-link" href="{% url 'crear_evento' %}">Crear evento</a>
                                    <!--TODO LO QUE HACE EL ADMIN-->

                                {% endif %}
                                {% else %}
                                <a class="nav-link" href="{% url 'login' %}">Iniciar sesión</a>
                                <a class="nav-link" href="{% url 'registro_cliente' %}">Registro</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <div class="container mt-4 mb-4">
            {% block contenido %}
            {% endblock %}
        </div>
    </main>
    <footer>
        <div class="container">
            <p>Visita www.titicket.cl</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
